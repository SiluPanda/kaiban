services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pith
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pith-secret}
      POSTGRES_DB: pith
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pith -d pith"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3456}:3456"
    environment:
      DATABASE_URL: postgres://pith:${POSTGRES_PASSWORD:-pith-secret}@postgres:5432/pith
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3456
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3456/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
